name: Test BCC CTRF Parsing (throwaway)

on:
  push:
    branches:
      - sahilm/test-bcc-ctrf-github
  workflow_dispatch:

jobs:
  parse-ctrf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Parse BCC CTRF report
        uses: ctrf-io/github-test-reporter@v1
        with:
          report-path: build/reports/specmatic/backward_compatibility/ctrf/ctrf-report.json
          github-report: true
        if: always()
