openapi: 3.0.0
info:
  title: Resiliency Testing BFF
  description: Lab contract for graceful 429 and 202 responses
  version: '6.0'
  contact:
    email: devs@specmatic.io
servers:
  - url: http://localhost:8080
tags:
  - name: Product
    description: Product related APIs
  - name: Monitor
    description: Monitor APIs
paths:
  /products:
    summary: Create a new product
    post:
      description: Create a new product
      operationId: createProduct
      tags:
        - Product
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductBase'
            examples:
              SUCCESS_PRODUCT:
                value:
                  name: iPhone
                  type: gadget
                  inventory: 100
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Id'
              examples:
                SUCCESS_PRODUCT:
                  value:
                    id: 1
        '202':
          description: Product Accepted
          headers:
            Link:
              schema:
                $ref: '#/components/schemas/MonitorLink'
            Retry-After:
              schema:
                type: integer
                description: The number of seconds to wait before polling the monitor link
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest'
  /findAvailableProducts:
    parameters:
      - schema:
          $ref : '#/components/schemas/ProductType'
        name: type
        in: query
        required: false
        examples:
          SUCCESS_GET:
            value: gadget
      - name: pageSize
        in: header
        schema:
          type: integer
        required: true
        examples:
          SUCCESS_GET:
            value: 10
      - name: from-date
        in: query
        schema:
          type: string
          format: date
        required: true
        description: Filter products created from this date
        examples:
          SUCCESS_GET:
            value: "2025-01-01"
      - name: to-date
        in: query
        schema:
          type: string
          format: date
        required: true
        description: Filter products created by this date
        examples:
          SUCCESS_GET:
            value: "2025-11-28"
    get:
      description: Find available products
      operationId: findAvailableProducts
      tags:
        - Product
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
              examples:
                SUCCESS_GET:
                  value:
                    - name: iPhone
                      id: 1
                      type: gadget
                      inventory: 100
                      createdOn: "2024-01-01"
        '429':
          description: TooManyRequests
          headers:
            Retry-After:
              schema:
                type: integer
                description: The number of seconds to wait before making the next request
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest'
  /monitor/{id}:
    get:
      description: Retrieves a Monitor by ID
      operationId: retrieveMonitor
      tags:
        - Monitor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Monitor status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonitorResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest'
components:
  schemas:
    ProductInventory:
      type: integer
      minimum: 1
      maximum: 101
    ProductType:
      type: string
      title: Product Type
      enum:
        - book
        - food
        - gadget
        - other
    MonitorLink:
      type: string
      description: Monitor link to check status
      example: </monitor/123>;rel=related;title=monitor
    Id:
      type: object
      properties:
        id:
          type: integer
      required:
        - id
    ProductBase:
      title: Product Details
      type: object
      properties:
        name:
          type: string
        type:
          $ref: '#/components/schemas/ProductType'
        inventory:
          $ref: '#/components/schemas/ProductInventory'
      required:
        - name
        - type
        - inventory
    CreatedOn:
        type: object
        required:
          - createdOn
        properties:
          createdOn:
            type: string
            format: date
    Product:
      allOf:
        - $ref: '#/components/schemas/Id'
        - $ref: '#/components/schemas/ProductBase'
        - $ref: '#/components/schemas/CreatedOn'
    MonitorResponse:
      type: object
      description: Monitoring of resources
      properties:
        request:
          $ref: '#/components/schemas/Request'
        response:
          $ref: '#/components/schemas/Response'
    Request:
      type: object
      description: A response to a request
      properties:
        method:
          type: string
        body:
          type: object
        headers:
          type: array
          items:
            $ref: '#/components/schemas/HeaderItem'
      required:
        - method
        - body
        - headers
    Response:
      type: object
      description: A response to a request
      properties:
        statusCode:
          type: integer
        body:
          type: object
        headers:
          type: array
          items:
            $ref: '#/components/schemas/HeaderItem'
      required:
        - statusCode
        - body
        - headers
    HeaderItem:
      type: object
      properties:
        name:
          type: string
        value:
          type: string
    BadRequest:
      title: Bad Request
      type: object
      properties:
        timestamp:
          type: string
        status:
          type: integer
        error:
          type: string
        message:
          type: string
