openapi: 3.0.1
info:
  title: User API
  version: "1.0.0"
tags:
  - name: User
    description: User retrieval operations.
paths:
  /api/users/{id}:
    get:
      summary: Get user by id
      description: Retrieves a user by identifier.
      operationId: getUserById
      tags:
        - User
      parameters:
        - name: id
          in: path
          required: true
          description: Identifier of the user.
          schema:
            type: integer
      responses:
        "200":
          $ref: "#/components/responses/User200"
components:
  responses:
    User200:
      description: User found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/User"
  schemas:
    User:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
        name:
          type: string
