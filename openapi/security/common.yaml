components:
  schemas:
    ProductType:
      $ref: '../../common/openapi/common-schemas.yaml#/components/schemas/ProductType'
    ProductDetails:
      title: Product Details
      type: object
      properties:
        name:
          type: string
        type:
          $ref: '../../common/openapi/common-schemas.yaml#/components/schemas/ProductType'
        inventory:
          type: integer 
      required:
        - name
        - type
        - inventory
    ProductId:
      $ref: '../../common/openapi/common-schemas.yaml#/components/schemas/Id'
    Product:
      title: Product
      allOf:
        - $ref: '#/components/schemas/ProductId'
        - $ref: '#/components/schemas/ProductDetails'
    OrderStatus:
      $ref: '../../common/openapi/common-schemas.yaml#/components/schemas/FulfilledOrderStatus'
    OrderDetails:
      title: Order Details
      description: Order details including product id, count and status
      type: object
      properties:
        productid:
          type: integer
        count:
          type: integer
        status:
          $ref: '../../common/openapi/common-schemas.yaml#/components/schemas/FulfilledOrderStatus'
      required:
        - productid
        - count
        - status
    OrderId:
      $ref: '../../common/openapi/common-schemas.yaml#/components/schemas/Id'
    Order:
      title: Order
      allOf:
        - $ref: '#/components/schemas/OrderId'
        - $ref: '#/components/schemas/OrderDetails'
  parameters:
    OrderStatusParam:
      name: OrderStatusParam
      in: query
      required: false
      schema:
        type: string
        enum:
          - fulfilled
          - pending
          - cancelled
