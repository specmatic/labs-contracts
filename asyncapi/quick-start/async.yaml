asyncapi: 3.0.0
info:
  title: Order API
  version: 1.0.0
servers:
  kafka-server:
    host: 'kafka:9092'
    protocol: kafka
channels:
  NewOrderPlaced:
    address: new-orders
    messages:
      placeOrder.message:
        $ref: '#/components/messages/OrderRequest'
  OrderInitiated:
    address: wip-orders
    messages:
      processOrder.message:
        $ref: '#/components/messages/Order'

operations:
  placeOrder:
    action: receive
    channel:
      $ref: '#/channels/NewOrderPlaced'
    messages:
      - $ref: '#/channels/NewOrderPlaced/messages/placeOrder.message'
    reply:
      channel:
        $ref: '#/channels/OrderInitiated'
      messages:
        - $ref: '#/channels/OrderInitiated/messages/processOrder.message'
components:
  messages:
    OrderRequest:
      name: OrderRequest
      title: An order request
      contentType: application/json
      bindings:
        kafka:
          key:
            type: integer
      examples:
        - name: KeyboardAndMouseOrderExample
          payload:
            id: 1001
            orderItems:
              - id: 11
                name: Keyboard
                quantity: 1
                price: 49.99
              - id: 12
                name: Mouse
                quantity: 1
                price: 39.98
          headers:
            orderCorrelationId: "req-1001"
      headers:
        type: object
        properties:
          orderCorrelationId:
            type: string
            description: Unique identifier for the request
      correlationId:
        $ref: "#/components/correlationIds/orderCorrelationId"
      payload:
        type: object
        required:
          - id
          - orderItems
        properties:
          id:
            type: integer
          orderItems:
            type: array
            items:
              type: object
              properties:
                id:
                  type: integer
                name:
                  type: string
                quantity:
                  type: integer
                price:
                  type: number
              required:
                - id
                - name
                - quantity
                - price
    Order:
      name: OrderToProcess
      title: An order that needs to be processed
      contentType: application/json
      bindings:
        kafka:
          key:
            type: integer
      examples:
        - name: KeyboardAndMouseOrderExample
          payload:
            id: 1001
            totalAmount: 89.97
            status: INITIATED
          headers:
            orderCorrelationId: "req-1001"
      headers:
        type: object
        properties:
          orderCorrelationId:
            type: string
            description: Unique identifier for the request
      correlationId:
        $ref: "#/components/correlationIds/orderCorrelationId"
      payload:
        type: object
        required:
          - id
          - totalAmount
          - status
        properties:
          id:
            type: integer
          totalAmount:
            type: number
          status:
            $ref: '#/components/messages/OrderStatus'
    OrderStatus:
      name: OrderStatus
      title: Order status
      payload:
        type: string
        enum:
          - PENDING
          - INITIATED
          - ACCEPTED
          - SHIPPED
          - DELIVERED
          - CANCELLED

  correlationIds:
    orderCorrelationId:
      location: '$message.header#/orderCorrelationId'
