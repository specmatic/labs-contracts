openapi: 3.0.0
info:
  title: Order BFF
  description: Sample Order BFF
  version: '6.0'
  contact:
    email: devs@specmatic.io
servers:
  - url: http://localhost:8080
tags:
  - name: Monitor
    description: Monitor Related APIs
  - name: Order
    description: Order Related APIs
  - name: Product
    description: Product Related APIs
  - name: WIP
    description: API still under development
paths:
  /products:
    summary: Create a new product
    post:
      summary: Create a product
      description: Create a new product
      operationId: createProduct
      tags:
        - Product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../common-schemas.yaml#/components/schemas/ProductBase'
            examples:
              SUCCESS_PRODUCT:
                value:
                  name: iPhone
                  type: gadget
                  inventory: 100
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '../common-schemas.yaml#/components/schemas/Id'
              examples:
                SUCCESS_PRODUCT:
                  value:
                    id: 1
        '202':
          description: Product Accepted
          headers:
            Link:
              schema:
                $ref: '../common-schemas.yaml#/components/schemas/MonitorLink'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '../common-schemas.yaml#/components/schemas/BadRequest'
  /findAvailableProducts:
    parameters:
      - schema:
          $ref : '../common-schemas.yaml#/components/schemas/ProductType'
        name: type
        in: query
        required: false
        description: Filter available products by product type.
        examples:
          SUCCESS_GET:
            value: gadget
      - name: pageSize
        in: header
        schema:
          type: integer
        required: true
        description: Number of products to return per page.
        examples:
          SUCCESS_GET:
            value: 10
      - name: from-date
        in: query
        schema:
          type: string
          format: date
        required: true
        description: Filter products created from this date
        examples:
          SUCCESS_GET:
            value: "2025-01-01"
      - name: to-date
        in: query
        schema:
          type: string
          format: date
        required: true
        description: Filter products created by this date
        examples:
          SUCCESS_GET:
            value: "2025-11-28"
    get:
      summary: Find available products
      description: Find available products
      operationId: findAvailableProducts
      tags:
        - Product
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '../common-schemas.yaml#/components/schemas/Product'
              examples:
                SUCCESS_GET:
                  value:
                    - name: iPhone
                      id: 1
                      type: gadget
                      inventory: 100
                      createdOn: "2024-01-01"
        '429':
          description: TooManyRequests
          headers:
            Retry-After:
              schema:
                type: integer
                description: The number of seconds to wait before making the next request
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '../common-schemas.yaml#/components/schemas/BadRequest'
  /orders:
    post:
      summary: Create an order
      description: Create a new order
      operationId: createOrder
      tags:
        - Order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../common-schemas.yaml#/components/schemas/OrderBase'
            examples:
              SUCCESS_ORDER:
                value:
                  productid: 1
                  count: 2
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '../common-schemas.yaml#/components/schemas/Id'
              examples:
                SUCCESS_ORDER:
                  value:
                    id: 1
        '202':
          description: Order accepted
          headers:
            Link:
              schema:
                $ref: '../common-schemas.yaml#/components/schemas/MonitorLink'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '../common-schemas.yaml#/components/schemas/BadRequest'
    get:
      summary: Retrieve orders
      description: Retrieve orders
      operationId: getOrders
      tags:
        - WIP
      parameters:
        - in: query
          name: orderId
          schema:
            type: integer
          required: false
          description: ID of the order to retrieve. If not provided, returns all orders.
          examples:
            SUCCESS_GET_ORDER:
              value: 100
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '../common-schemas.yaml#/components/schemas/Order'
              examples:
                SUCCESS_GET_ORDER:
                  value:
                    - id: 1
                      productid: 1
                      count: 2
                      status: "completed"
  /monitor/{id}:
    $ref: '../common-schemas.yaml#/components/pathItems/MonitorById'
